apply plugin: 'com.android.library'

android {
    compileSdk 34
    namespace 'ngo.xnet.libzt'

    defaultConfig {
        minSdk 24
        targetSdk 34
        ndk {
            abiFilters "arm64-v8a"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-fexceptions", "-frtti"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
